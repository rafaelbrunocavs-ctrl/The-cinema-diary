<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cine Festival</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<header>
<h1>Cine Festival</h1>
<input id="search" placeholder="Buscar filme">
<button onclick="searchMovie()">Buscar</button>
</header>

<section>
<h2>Recomendações</h2>
<div id="recommendations" class="grid"></div>
</section>

<section>
<h2>Watchlist</h2>
<div id="watchlist" class="grid"></div>
</section>

<section>
<h2>Festival</h2>
<button onclick="createFestival()">Criar festival</button>
<div id="festival"></div>
</section>

<script src="app.js"></script>
</body>
</html>
